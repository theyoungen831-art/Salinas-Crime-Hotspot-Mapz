<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Salinas Crime Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #151522;
  --card-hover: #1d1d2e;
  --border: #1f1f30;
  --text: #f0f0ff;
  --muted: #5a5a7a;
  --mono: ui-monospace, 'SF Mono', Menlo, monospace;
  --display: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --homicide:#ff2d2d; --shooting:#ff6b00; --robbery:#f5c400;
  --assault:#bf00ff; --vehicle:#00c2ff; --gang:#ff007f;
  --theft:#00e676; --burglary:#00b8d4; --drugs:#ffd000; --stabbing:#e91e63;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  touch-action: manipulation;
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: relative; }

/* ─── TOP BAR ─── */
#topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 500;
  padding: max(12px, env(safe-area-inset-top)) 14px 8px;
  background: linear-gradient(to bottom, rgba(8,8,16,0.96) 70%, transparent);
  pointer-events: none;
}
.topbar-inner { display: flex; align-items: center; justify-content: space-between; pointer-events: all; gap: 8px; }
.app-title { font-family: var(--display); font-size: 1.25rem; font-weight: 800; line-height: 1; }
.app-title span { color: var(--homicide); }
.year-pill { font-size: 0.6rem; letter-spacing: 0.12em; color: var(--muted); margin-top: 3px; }

.top-actions { display: flex; gap: 6px; align-items: center; }

.count-badge {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 7px 14px; font-size: 0.65rem; display: flex; align-items: center; gap: 6px;
}
.count-badge .num { font-size: 1rem; font-weight: 600; color: var(--homicide); font-family: var(--display); }

.icon-btn {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 50%; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; cursor: pointer;
  transition: all 0.15s;
}
.icon-btn:active { transform: scale(0.92); background: var(--card-hover); }

#map { position: absolute; inset: 0; z-index: 1; background: #0a0a18; }
#canvas-map { position: absolute; inset: 0; z-index: 1; display: none; background: #0a0a18; }
#canvas-map.active { display: block; }

#loading {
  position: absolute; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  color: var(--muted); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
}
#loading.hidden { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border); border-top-color: var(--homicide);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── SEARCH OVERLAY ─── */
#search-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 900;
  background: rgba(8,8,16,0.98);
  display: none;
  flex-direction: column;
  padding: max(12px, env(safe-area-inset-top)) 14px 14px;
}
#search-overlay.show { display: flex; }
.search-header { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.search-input {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 18px;
  color: var(--text); font-family: var(--mono); font-size: 0.9rem;
  outline: none;
}
.search-input:focus { border-color: var(--homicide); }
.search-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; }

/* ─── STATS OVERLAY ─── */
#stats-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 900;
  background: rgba(8,8,16,0.98);
  display: none;
  flex-direction: column;
  padding: max(12px, env(safe-area-inset-top)) 14px 14px;
  overflow-y: auto;
}
#stats-overlay.show { display: flex; }
.stats-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.stats-title { font-family: var(--display); font-size: 1.4rem; font-weight: 800; }

.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
}
.stat-card .stat-num { font-family: var(--display); font-size: 1.8rem; font-weight: 800; line-height: 1; }
.stat-card .stat-lbl { font-size: 0.55rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-top: 6px; }

.chart-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; margin-bottom: 12px;
}
.chart-title { font-family: var(--display); font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; }

.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.bar-label { width: 40px; font-size: 0.6rem; color: var(--muted); flex-shrink: 0; }
.bar-track { flex: 1; height: 14px; background: var(--surface); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
.bar-count { width: 30px; text-align: right; font-size: 0.65rem; color: var(--text); }

.type-stat {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; margin-bottom: 4px;
}
.type-stat .ts-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
.type-stat .ts-label { flex: 1; font-size: 0.7rem; text-transform: uppercase; }
.type-stat .ts-count { font-family: var(--display); font-weight: 700; }

/* ─── BOTTOM SHEET ─── */
#sheet {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 400;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom, 16px);
  transform: translateY(0);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 80dvh;
  display: flex; flex-direction: column;
}
#sheet.collapsed { transform: translateY(calc(100% - 130px)); }

.sheet-handle {
  width: 44px; height: 5px;
  background: var(--border); border-radius: 3px;
  margin: 12px auto 0;
  flex-shrink: 0;
}

.sheet-tabs { display: flex; padding: 12px 14px 0; gap: 8px; flex-shrink: 0; }
.tab-btn {
  flex: 1;
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  color: var(--muted); font-family: var(--mono); font-size: 0.65rem;
  letter-spacing: 0.1em; padding: 11px 4px; text-transform: uppercase; cursor: pointer;
  font-weight: 600;
}
.tab-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }

/* ─── LEGEND — REDESIGNED FOR MOBILE ─── */
#tab-legend {
  padding: 14px 14px 8px; overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; gap: 0;
  -webkit-overflow-scrolling: touch;
}

.legend-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 4px 12px;
  flex-shrink: 0;
}

.legend-title {
  font-family: var(--display);
  font-size: 0.95rem;
  font-weight: 700;
}

.legend-sub {
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.toggle-all-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 0.6rem;
  font-family: var(--mono);
  letter-spacing: 0.08em;
  cursor: pointer;
  text-transform: uppercase;
  font-weight: 600;
}
.toggle-all-btn:active { background: var(--card-hover); }

/* Bigger touch-friendly legend rows */
.legend-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
  min-height: 56px;
  user-select: none;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.legend-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: currentColor;
  opacity: 0;
  transition: opacity 0.2s;
}

.legend-row.on::before { opacity: 1; }

.legend-row.off {
  opacity: 0.45;
  background: var(--bg);
}

.legend-row:active { transform: scale(0.98); }

.legend-icon-wrap {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 1.1rem;
  background: var(--surface);
  border: 2px solid currentColor;
  transition: all 0.2s;
}

.legend-row.off .legend-icon-wrap {
  border-color: var(--muted);
  background: transparent;
}

.legend-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.legend-name {
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  font-family: var(--display);
  color: var(--text);
}

.legend-row.off .legend-name { color: var(--muted); }

.legend-count {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.legend-toggle {
  width: 48px; height: 28px;
  background: var(--surface);
  border-radius: 14px;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
  border: 1px solid var(--border);
}

.legend-toggle::after {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  background: var(--muted);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
}

.legend-row.on .legend-toggle {
  background: currentColor;
  border-color: currentColor;
}

.legend-row.on .legend-toggle::after {
  left: 23px;
  background: #fff;
}

/* ─── FEED TAB ─── */
#tab-feed {
  padding: 14px 14px 8px; overflow-y: auto; flex: 1;
  display: none; flex-direction: column; gap: 8px;
  -webkit-overflow-scrolling: touch;
}

.feed-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 14px;
  border-left: 4px solid transparent;
  display: flex; gap: 12px; align-items: flex-start;
  cursor: pointer;
  min-height: 64px;
}
.feed-card:active { background: var(--card-hover); }

.feed-dot {
  width: 12px; height: 12px; border-radius: 50%;
  margin-top: 4px; flex-shrink: 0;
}
.feed-body { flex: 1; min-width: 0; }
.feed-type { font-family: var(--display); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; }
.feed-meta { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 2px; }
.feed-area { font-size: 0.7rem; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-date { font-size: 0.58rem; color: var(--muted); margin-top: 3px; }

/* ─── YEAR CHIPS — HIDES WHEN LEGEND OPEN ─── */
#year-scroll {
  position: absolute; bottom: 136px; left: 0; right: 0; z-index: 450;
  overflow-x: auto; display: flex; gap: 6px; padding: 0 14px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  transition: opacity 0.3s ease, transform 0.3s ease;
  opacity: 1;
}
#year-scroll.hidden {
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
}
#year-scroll::-webkit-scrollbar { display: none; }

.yr-chip {
  flex-shrink: 0;
  background: rgba(15,15,26,0.92); border: 1px solid var(--border);
  border-radius: 20px; color: var(--muted); font-family: var(--mono);
  font-size: 0.65rem; padding: 8px 14px; cursor: pointer;
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  white-space: nowrap; letter-spacing: 0.08em;
  min-height: 32px;
}
.yr-chip.active { background: var(--text); border-color: var(--text); color: var(--bg); font-weight: 700; }
.yr-chip.recent { border-color: var(--homicide); color: var(--homicide); }
.yr-chip.recent.active { background: var(--homicide); border-color: var(--homicide); color: #fff; }

/* ─── POPUP ─── */
.leaflet-popup-content-wrapper {
  background: var(--card) !important; border: 1px solid var(--border) !important;
  border-radius: 14px !important; color: var(--text) !important;
  font-family: var(--mono) !important; padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; width: 240px !important; }
.leaflet-popup-tip-container { display: none; }
.popup-body { padding: 14px; }
.popup-type { font-family: var(--display); font-size: 1rem; font-weight: 800; text-transform: uppercase; }
.popup-meta { font-size: 0.55rem; color: var(--muted); margin: 3px 0 8px; }
.popup-area { font-size: 0.7rem; margin-bottom: 6px; }
.popup-desc { font-size: 0.58rem; color: #8888aa; line-height: 1.55; border-top: 1px solid var(--border); padding-top: 8px; }
.popup-date { font-size: 0.55rem; color: #888; margin-top: 6px; }
.popup-source { font-size: 0.5rem; color: var(--muted); margin-top: 4px; font-style: italic; }

.leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 10px !important; overflow: hidden; margin-right: 14px !important; margin-top: 90px !important; }
.leaflet-control-zoom a { background: var(--card) !important; color: var(--text) !important; width: 36px !important; height: 36px !important; line-height: 36px !important; }
.leaflet-control-attribution { background: rgba(8,8,16,0.7) !important; color: var(--muted) !important; font-size: 8px !important; }
.leaflet-control-attribution a { color: var(--muted) !important; }

.selected-info {
  position: absolute; top: 90px; left: 14px; right: 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; z-index: 350;
  display: none;
}
.selected-info.show { display: block; }
.mode-tag {
  position: absolute; top: 90px; right: 14px; z-index: 350;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px 8px;
  font-size: 0.55rem; letter-spacing: 0.1em; color: var(--muted);
}
</style>
</head>

  <div id="topbar">

    <div id="tab-legend"></div>
    <div id="tab-feed"></div>
  </div>
</div>

let activeYear = 'all';
let activeTab = 'legend';
let leafletMarkers = [];
let map = null;
let canvasMode = false;
let selectedIncident = null;
let sheetOpen = false;

function getFiltered() {
  return incidents.filter(i => (activeYear === 'all' || i.year === parseInt(activeYear)) && visible[i.type]);
}

function init() {
  renderLegend();
  renderFeed();

  let loaded = false;
  const timeout = setTimeout(() => {
    if (!loaded) {
      document.getElementById('loading').classList.add('hidden');
      initCanvasMap();
    }
  }, 5000);

  if (typeof L !== 'undefined') {
    loaded = true; clearTimeout(timeout);
    document.getElementById('loading').classList.add('hidden');
    initLeafletMap();
    return;
  }

  const script = document.createElement('script');
  script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload = () => {
    loaded = true; clearTimeout(timeout);
    document.getElementById('loading').classList.add('hidden');
    if (typeof L !== 'undefined') initLeafletMap(); else initCanvasMap();
  };
  script.onerror = () => {
    loaded = true; clearTimeout(timeout);
    document.getElementById('loading').classList.add('hidden');
    initCanvasMap();
  };
  document.head.appendChild(script);
}

function initLeafletMap() {
  try {
    map = L.map('map', { center: [36.677, -121.635], zoom: 13, zoomControl: true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '©OpenStreetMap ©CARTO', maxZoom: 19
    }).addTo(map);
    renderLeafletMarkers();
  } catch(e) { initCanvasMap(); }
}

function renderLeafletMarkers() {
  if (!map) return;
  leafletMarkers.forEach(m => map.removeLayer(m));
  leafletMarkers = [];
  const filtered = getFiltered();
  filtered.forEach(inc => {
    const cfg = CRIMES[inc.type];
    const c = L.circleMarker([inc.lat, inc.lng], {
      radius: cfg.radius, color: cfg.color, fillColor: cfg.color,
      fillOpacity: 0.75, weight: 1.5
    }).addTo(map);
    if (inc.year >= 2024) {
      const g = L.circleMarker([inc.lat, inc.lng], {
        radius: cfg.radius + 7, color: cfg.color, fillOpacity: 0, weight: 1, opacity: 0.3
      }).addTo(map);
      leafletMarkers.push(g);
    }
    c.bindPopup(`<div class="popup-body">
      <div class="popup-type" style="color:${cfg.color}">${cfg.emoji} ${inc.type.toUpperCase()}</div>
      <div class="popup-meta">${inc.year} · INCIDENT #${inc.id}</div>
      <div class="popup-area">📍 ${inc.area}</div>
      <div class="popup-desc">${inc.desc}</div>
      ${inc.date ? `<div class="popup-date">📅 ${inc.date}</div>` : ''}
      ${inc.source ? `<div class="popup-source">Source: ${inc.source}</div>` : ''}
    </div>`, { maxWidth: 260 });
    leafletMarkers.push(c);
  });
  document.getElementById('badge-count').textContent = filtered.length;
}

function initCanvasMap() {
  canvasMode = true;
  document.getElementById('canvas-map').classList.add('active');
  document.getElementById('mode-tag').style.display = 'block';
  const canvas = document.getElementById('canvas-map');
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    drawCanvas();
  }
  window.addEventListener('resize', resize);
  resize();
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    const hit = findHit(e.clientX - r.left, e.clientY - r.top);
    if (hit) { selectedIncident = hit; showSelectedInfo(); }
    else { selectedIncident = null; document.getElementById('selected-info').classList.remove('show'); }
    drawCanvas();
  });
}

function latLngToXY(lat, lng) {
  const b = { minLat: 36.655, maxLat: 36.700, minLng: -121.665, maxLng: -121.605 };
  const w = window.innerWidth, h = window.innerHeight;
  return {
    x: ((lng - b.minLng) / (b.maxLng - b.minLng)) * w,
    y: (1 - (lat - b.minLat) / (b.maxLat - b.minLat)) * h
  };
}

function findHit(px, py) {
  const filtered = getFiltered();
  for (let i = filtered.length - 1; i >= 0; i--) {
    const inc = filtered[i];
    const { x, y } = latLngToXY(inc.lat, inc.lng);
    const r = CRIMES[inc.type].radius + 5;
    if ((px-x)*(px-x) + (py-y)*(py-y) <= r*r) return inc;
  }
  return null;
}

function drawCanvas() {
  const canvas = document.getElementById('canvas-map');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = window.innerWidth, h = window.innerHeight;
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(40, 40, 70, 0.4)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < w; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for (let y = 0; y < h; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
  ctx.fillStyle = 'rgba(255, 45, 45, 0.05)';
  const es = latLngToXY(36.678, -121.622);
  ctx.beginPath(); ctx.arc(es.x, es.y, 90, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(140, 140, 180, 0.6)';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('EAST SALINAS', es.x + 35, es.y);
  const dt = latLngToXY(36.669, -121.654);
  ctx.fillText('DOWNTOWN', dt.x - 75, dt.y);
  const al = latLngToXY(36.687, -121.630);
  ctx.fillText('ALISAL', al.x + 20, al.y);
  ctx.fillStyle = 'rgba(90, 90, 122, 0.4)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SALINAS, CA — TAP DOTS FOR DETAILS', w/2, 40);
  const filtered = getFiltered();
  filtered.forEach(inc => {
    const cfg = CRIMES[inc.type];
    const { x, y } = latLngToXY(inc.lat, inc.lng);
    if (inc.year >= 2024) {
      ctx.beginPath();
      ctx.arc(x, y, cfg.radius + 6, 0, Math.PI*2);
      ctx.strokeStyle = cfg.color + '55';
      ctx.lineWidth = 1; ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(x, y, cfg.radius * 0.8, 0, Math.PI*2);
    ctx.fillStyle = cfg.color;
    ctx.globalAlpha = 0.75; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = cfg.color; ctx.lineWidth = 1.5; ctx.stroke();
    if (selectedIncident && selectedIncident.id === inc.id) {
      ctx.beginPath();
      ctx.arc(x, y, cfg.radius + 9, 0, Math.PI*2);
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
    }
  });
  document.getElementById('badge-count').textContent = filtered.length;
}

function showSelectedInfo() {
  if (!selectedIncident) return;
  const cfg = CRIMES[selectedIncident.type];
  const info = document.getElementById('selected-info');
  info.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <span style="font-size:1.1rem">${cfg.emoji}</span>
      <span style="font-family:var(--display);font-weight:800;text-transform:uppercase;color:${cfg.color};font-size:0.9rem;">${selectedIncident.type}</span>
      <span style="font-size:0.55rem;color:var(--muted);margin-left:auto;">${selectedIncident.year} · #${selectedIncident.id}</span>
    </div>
    <div style="font-size:0.7rem;margin-bottom:4px;">📍 ${selectedIncident.area}</div>
    <div style="font-size:0.58rem;color:#8888aa;line-height:1.5;">${selectedIncident.desc}</div>
    ${selectedIncident.date ? `<div style="font-size:0.55rem;color:#888;margin-top:6px;">📅 ${selectedIncident.date}</div>` : ''}
  `;
  info.classList.add('show');
}

function renderLegend() {
  const filtered = getFiltered();
  const counts = {};
  Object.keys(CRIMES).forEach(k => counts[k] = 0);
  filtered.forEach(i => counts[i.type]++);

  const allOn = Object.values(visible).every(v => v);
  const toggleAllLabel = allOn ? 'Hide All' : 'Show All';

  const header = `
    <div class="legend-header">
      <div>
        <div class="legend-title">Crime Types</div>
        <div class="legend-sub">Tap to filter on map</div>
      </div>
      <button class="toggle-all-btn" onclick="toggleAll()">${toggleAllLabel}</button>
    </div>
  `;

  const rows = Object.entries(CRIMES).map(([k, c]) => `
    <div class="legend-row ${visible[k] ? 'on' : 'off'}" onclick="toggleType('${k}')" style="color:${c.color}">
      <div class="legend-icon-wrap">${c.emoji}</div>
      <div class="legend-text">
        <div class="legend-name">${c.label}</div>
        <div class="legend-count">${counts[k]} incident${counts[k] !== 1 ? 's' : ''}</div>
      </div>
      <div class="legend-toggle"></div>
    </div>
  `).join('');

  document.getElementById('tab-legend').innerHTML = header + rows;
}

function toggleAll() {
  const allOn = Object.values(visible).every(v => v);
  Object.keys(visible).forEach(k => visible[k] = !allOn);
  refresh();
}

function renderFeed() {
  const sorted = [...getFiltered()].sort((a, b) => b.year - a.year);
  const c = document.getElementById('tab-feed');
  if (!sorted.length) {
    c.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted);font-size:0.65rem;">NO INCIDENTS MATCH FILTER</div>';
    return;
  }
  c.innerHTML = sorted.map(inc => {
    const cfg = CRIMES[inc.type];
    return `<div class="feed-card" onclick="zoomTo(${inc.lat},${inc.lng},${inc.id})" style="border-left-color:${cfg.color}">
      <div class="feed-dot" style="background:${cfg.color}; box-shadow:0 0 6px ${cfg.color}"></div>
      <div class="feed-body">
        <div class="feed-type" style="color:${cfg.color}">${cfg.emoji} ${inc.type}</div>
        <div class="feed-meta">${inc.year} · #${inc.id}</div>
        <div class="feed-area">${inc.area}</div>
        ${inc.date ? `<div class="feed-date">📅 ${inc.date}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function refresh() {
  if (canvasMode) drawCanvas();
  else if (map) renderLeafletMarkers();
  renderLegend();
  renderFeed();
  document.getElementById('badge-count').textContent = getFiltered().length;
}

function toggleType(t) { visible[t] = !visible[t]; refresh(); }

function zoomTo(lat, lng, id) {
  if (map) {
    map.setView([lat, lng], 16);
    setTimeout(() => {
      leafletMarkers.forEach(m => {
        if (m.getLatLng && Math.abs(m.getLatLng().lat - lat) < 0.001) m.openPopup();
      });
    }, 300);
  } else if (canvasMode) {
    selectedIncident = incidents.find(i => i.id === id);
    showSelectedInfo();
    drawCanvas();
  }
  closeSheet();
  closeSearch();
}

function openSearch() {
  document.getElementById('search-overlay').classList.add('show');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
  renderSearch('');
}
function closeSearch() { document.getElementById('search-overlay').classList.remove('show'); }

function renderSearch(query) {
  const q = query.toLowerCase().trim();
  const results = q === '' ? incidents.slice(0, 30) : incidents.filter(inc =>
    inc.area.toLowerCase().includes(q) ||
    inc.type.toLowerCase().includes(q) ||
    inc.desc.toLowerCase().includes(q) ||
    (inc.date && inc.date.toLowerCase().includes(q)) ||
    String(inc.year).includes(q)
  );
  const c = document.getElementById('search-results');
  if (!results.length) {
    c.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted);font-size:0.7rem;">NO MATCHES FOUND</div>';
    return;
  }
  c.innerHTML = results.slice(0, 50).map(inc => {
    const cfg = CRIMES[inc.type];
    return `<div class="feed-card" onclick="zoomTo(${inc.lat},${inc.lng},${inc.id})" style="border-left-color:${cfg.color}">
      <div class="feed-dot" style="background:${cfg.color}; box-shadow:0 0 6px ${cfg.color}"></div>
      <div class="feed-body">
        <div class="feed-type" style="color:${cfg.color}">${cfg.emoji} ${inc.type}</div>
        <div class="feed-meta">${inc.year} · #${inc.id}</div>
        <div class="feed-area">${inc.area}</div>
        ${inc.date ? `<div class="feed-date">📅 ${inc.date}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('search-input').addEventListener('input', e => renderSearch(e.target.value));

function openStats() {
  document.getElementById('stats-overlay').classList.add('show');
  renderStats();
}
function closeStats() { document.getElementById('stats-overlay').classList.remove('show'); }

function renderStats() {
  const all = incidents;
  const total = all.length;
  const homicides = all.filter(i => i.type === 'homicide').length;
  const recent = all.filter(i => i.year >= 2024).length;
  const eastSalinas = all.filter(i => i.area.toLowerCase().includes('east salinas') || i.area.toLowerCase().includes('alisal') || i.area.toLowerCase().includes('hebbron')).length;
  const yearCounts = {};
  for (let y = 2015; y <= 2025; y++) yearCounts[y] = 0;
  all.forEach(i => yearCounts[i.year] = (yearCounts[i.year] || 0) + 1);
  const typeCounts = {};
  Object.keys(CRIMES).forEach(k => typeCounts[k] = 0);
  all.forEach(i => typeCounts[i.type]++);
  const maxYearCount = Math.max(...Object.values(yearCounts));
  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" style="color:var(--homicide)">${total}</div><div class="stat-lbl">Total Incidents</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--shooting)">${homicides}</div><div class="stat-lbl">Homicides</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--theft)">${recent}</div><div class="stat-lbl">2024–2025</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--gang)">${eastSalinas}</div><div class="stat-lbl">East Salinas</div></div>
    </div>
    <div class="chart-section"><div class="chart-title">📈 Incidents by Year</div>`;
  for (let y = 2015; y <= 2025; y++) {
    const count = yearCounts[y] || 0;
    const pct = maxYearCount > 0 ? (count / maxYearCount) * 100 : 0;
    const color = y >= 2024 ? 'var(--homicide)' : y >= 2022 ? 'var(--shooting)' : 'var(--robbery)';
    html += `<div class="bar-row"><div class="bar-label">${y}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-count">${count}</div></div>`;
  }
  html += `</div><div class="chart-section"><div class="chart-title">🎯 Breakdown by Crime Type</div>`;
  Object.entries(CRIMES).forEach(([k, c]) => {
    html += `<div class="type-stat"><div class="ts-dot" style="background:${c.color};color:${c.color}"></div><div class="ts-label">${c.label}</div><div class="ts-count" style="color:${c.color}">${typeCounts[k]}</div></div>`;
  });
  html += `</div><div class="chart-section"><div class="chart-title">📍 Key Facts</div>
    <div style="font-size:0.7rem;line-height:1.7;color:#aaa;">
      • Population: <strong style="color:#fff">191,656</strong><br>
      • Violent crime risk: <strong style="color:var(--homicide)">1 in 193</strong><br>
      • Property crime risk: <strong style="color:var(--theft)">1 in 60</strong><br>
      • Car theft risk: <strong style="color:var(--vehicle)">1 in 237</strong><br>
      • 2024 homicides: <strong style="color:#fff">6</strong> (down 5 vs 2023)<br>
      • Crime rate vs national: <strong style="color:var(--shooting)">1.46× higher</strong><br>
      • East Salinas: <strong style="color:#fff">~746 crimes/year</strong><br>
      • 2025 projected crime cost: <strong style="color:#fff">$93M</strong>
    </div></div>
    <div class="chart-section"><div class="chart-title">ℹ️ Data Sources</div>
    <div style="font-size:0.6rem;line-height:1.7;color:var(--muted);">
      Salinas PD news releases · FBI UCR/NIBRS · CBS SF · KION-TV · BSCC CalVIP Report · City-Data · CrimeGrade · NeighborhoodScout · Salinas Valley Tribune
    </div></div>`;
  document.getElementById('stats-content').innerHTML = html;
}

document.querySelectorAll('.yr-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.yr-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeYear = chip.dataset.year;
    refresh();
  });
});

// ─── TAB HANDLING WITH YEAR CHIP HIDING ───
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.getElementById('tab-legend').style.display = activeTab === 'legend' ? 'flex' : 'none';
    document.getElementById('tab-feed').style.display = activeTab === 'feed' ? 'flex' : 'none';
    updateYearChipVisibility();
  });
});

function updateYearChipVisibility() {
  const chips = document.getElementById('year-scroll');
  // Hide year chips when sheet is open AND legend tab is active
  if (sheetOpen && activeTab === 'legend') {
    chips.classList.add('hidden');
  } else {
    chips.classList.remove('hidden');
  }
}

const sheet = document.getElementById('sheet');
const handle = document.getElementById('sheet-handle');

function openSheet() {
  sheet.classList.remove('collapsed');
  sheetOpen = true;
  updateYearChipVisibility();
}
function closeSheet() {
  sheet.classList.add('collapsed');
  sheetOpen = false;
  updateYearChipVisibility();
}

handle.addEventListener('click', () => sheetOpen ? closeSheet() : openSheet());

// Also let people tap the tabs themselves to open sheet if collapsed
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!sheetOpen) openSheet();
  });
});

let touchStartY = 0;
sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
sheet.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 40) closeSheet();
  if (dy < -40) openSheet();
}, { passive: true });

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
