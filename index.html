<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Salinas Crime Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #151522;
  --border: #1f1f30;
  --text: #f0f0ff;
  --muted: #5a5a7a;
  --mono: ui-monospace, 'SF Mono', Menlo, monospace;
  --display: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --homicide:#ff2d2d; --shooting:#ff6b00; --robbery:#f5c400;
  --assault:#bf00ff; --vehicle:#00c2ff; --gang:#ff007f; --theft:#00e676;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  touch-action: manipulation;
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: relative; }

#topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 500;
  padding: max(12px, env(safe-area-inset-top)) 14px 8px;
  background: linear-gradient(to bottom, rgba(8,8,16,0.96) 70%, transparent);
  pointer-events: none;
}
.topbar-inner { display: flex; align-items: center; justify-content: space-between; pointer-events: all; }
.app-title { font-family: var(--display); font-size: 1.25rem; font-weight: 800; line-height: 1; }
.app-title span { color: var(--homicide); }
.year-pill { font-size: 0.6rem; letter-spacing: 0.12em; color: var(--muted); margin-top: 3px; }
.count-badge {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 12px; font-size: 0.65rem; display: flex; align-items: center; gap: 6px;
}
.count-badge .num { font-size: 1rem; font-weight: 600; color: var(--homicide); font-family: var(--display); }

#map { position: absolute; inset: 0; z-index: 1; background: #0a0a18; }
#canvas-map { position: absolute; inset: 0; z-index: 1; display: none; background: #0a0a18; }
#canvas-map.active { display: block; }

#loading {
  position: absolute; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  color: var(--muted); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
}
#loading.hidden { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border); border-top-color: var(--homicide);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#sheet {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 400;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom, 16px);
  transform: translateY(0);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 75dvh;
  display: flex; flex-direction: column;
}
#sheet.collapsed { transform: translateY(calc(100% - 130px)); }

.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
.sheet-tabs { display: flex; padding: 10px 14px 0; gap: 6px; }

.tab-btn {
  flex: 1;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  color: var(--muted); font-family: var(--mono); font-size: 0.6rem;
  letter-spacing: 0.1em; padding: 8px 4px; text-transform: uppercase; cursor: pointer;
}
.tab-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); font-weight: 600; }

#tab-legend, #tab-feed {
  padding: 14px 14px 8px; overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; gap: 8px;
  -webkit-overflow-scrolling: touch;
}
#tab-feed { display: none; }

.legend-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  user-select: none;
}
.legend-row.off { opacity: 0.4; }
.color-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 8px currentColor; }
.cr-label { flex: 1; font-size: 0.78rem; letter-spacing: 0.05em; text-transform: uppercase; }
.cr-count { font-size: 0.65rem; color: var(--muted); }
.toggle-icon { font-size: 1rem; width: 22px; text-align: center; }

.feed-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 12px;
  border-left: 3px solid transparent;
  display: flex; gap: 10px; align-items: flex-start;
}
.feed-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.feed-body { flex: 1; min-width: 0; }
.feed-type { font-family: var(--display); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
.feed-meta { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 1px; }
.feed-area { font-size: 0.62rem; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#year-scroll {
  position: absolute; bottom: 136px; left: 0; right: 0; z-index: 450;
  overflow-x: auto; display: flex; gap: 6px; padding: 0 14px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
#year-scroll::-webkit-scrollbar { display: none; }

.yr-chip {
  flex-shrink: 0;
  background: rgba(15,15,26,0.92); border: 1px solid var(--border);
  border-radius: 20px; color: var(--muted); font-family: var(--mono);
  font-size: 0.6rem; padding: 6px 12px; cursor: pointer;
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  white-space: nowrap; letter-spacing: 0.08em;
}
.yr-chip.active { background: var(--text); border-color: var(--text); color: var(--bg); font-weight: 600; }

.leaflet-popup-content-wrapper {
  background: var(--card) !important; border: 1px solid var(--border) !important;
  border-radius: 14px !important; color: var(--text) !important;
  font-family: var(--mono) !important; padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; width: 220px !important; }
.leaflet-popup-tip-container { display: none; }
.popup-body { padding: 12px; }
.popup-type { font-family: var(--display); font-size: 1rem; font-weight: 800; text-transform: uppercase; }
.popup-meta { font-size: 0.55rem; color: var(--muted); margin: 3px 0 8px; }
.popup-area { font-size: 0.7rem; margin-bottom: 6px; }
.popup-desc { font-size: 0.58rem; color: #8888aa; line-height: 1.55; border-top: 1px solid var(--border); padding-top: 8px; }

.leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 10px !important; overflow: hidden; margin-right: 14px !important; margin-top: 80px !important; }
.leaflet-control-zoom a { background: var(--card) !important; color: var(--text) !important; width: 34px !important; height: 34px !important; line-height: 34px !important; }
.leaflet-control-attribution { background: rgba(8,8,16,0.7) !important; color: var(--muted) !important; font-size: 8px !important; }
.leaflet-control-attribution a { color: var(--muted) !important; }

.selected-info {
  position: absolute; top: 85px; left: 14px; right: 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; z-index: 350;
  display: none;
}
.selected-info.show { display: block; }
.mode-tag {
  position: absolute; top: 85px; right: 14px; z-index: 350;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px 8px;
  font-size: 0.55rem; letter-spacing: 0.1em; color: var(--muted);
}
</style>
</head>

let activeYear = 'all';
let leafletMarkers = [];
let map = null;
let canvasMode = false;
let selectedIncident = null;

function getFiltered() {
  return incidents.filter(i => (activeYear === 'all' || i.year === parseInt(activeYear)) && visible[i.type]);
}

function init() {
  renderLegend();
  renderFeed();

  // Try loading Leaflet with 5-second timeout
  let loaded = false;
  const timeout = setTimeout(() => {
    if (!loaded) {
      document.getElementById('loading').classList.add('hidden');
      initCanvasMap();
    }
  }, 5000);

  if (typeof L !== 'undefined') {
    loaded = true;
    clearTimeout(timeout);
    document.getElementById('loading').classList.add('hidden');
    initLeafletMap();
    return;
  }

  const script = document.createElement('script');
  script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload = () => {
    loaded = true;
    clearTimeout(timeout);
    document.getElementById('loading').classList.add('hidden');
    if (typeof L !== 'undefined') {
      initLeafletMap();
    } else {
      initCanvasMap();
    }
  };
  script.onerror = () => {
    loaded = true;
    clearTimeout(timeout);
    document.getElementById('loading').classList.add('hidden');
    initCanvasMap();
  };
  document.head.appendChild(script);
}

function initLeafletMap() {
  try {
    map = L.map('map', { center: [36.677, -121.635], zoom: 13, zoomControl: true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '©OpenStreetMap ©CARTO', maxZoom: 19
    }).addTo(map);
    renderLeafletMarkers();
  } catch(e) {
    initCanvasMap();
  }
}

function renderLeafletMarkers() {
  if (!map) return;
  leafletMarkers.forEach(m => map.removeLayer(m));
  leafletMarkers = [];
  const filtered = getFiltered();
  filtered.forEach(inc => {
    const cfg = CRIMES[inc.type];
    const c = L.circleMarker([inc.lat, inc.lng], {
      radius: cfg.radius, color: cfg.color, fillColor: cfg.color,
      fillOpacity: 0.75, weight: 1.5
    }).addTo(map);
    if (inc.year >= 2023) {
      const g = L.circleMarker([inc.lat, inc.lng], {
        radius: cfg.radius + 7, color: cfg.color, fillOpacity: 0, weight: 1, opacity: 0.3
      }).addTo(map);
      leafletMarkers.push(g);
    }
    c.bindPopup(`<div class="popup-body">
      <div class="popup-type" style="color:${cfg.color}">${cfg.emoji} ${inc.type.toUpperCase()}</div>
      <div class="popup-meta">${inc.year} · INCIDENT #${inc.id}</div>
      <div class="popup-area">📍 ${inc.area}</div>
      <div class="popup-desc">${inc.desc}</div>
    </div>`, { maxWidth: 240 });
    leafletMarkers.push(c);
  });
  document.getElementById('badge-count').textContent = filtered.length;
}

function initCanvasMap() {
  canvasMode = true;
  document.getElementById('canvas-map').classList.add('active');
  document.getElementById('mode-tag').style.display = 'block';
  const canvas = document.getElementById('canvas-map');
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    drawCanvas();
  }
  window.addEventListener('resize', resize);
  resize();
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    const hit = findHit(e.clientX - r.left, e.clientY - r.top);
    if (hit) { selectedIncident = hit; showSelectedInfo(); }
    else { selectedIncident = null; document.getElementById('selected-info').classList.remove('show'); }
    drawCanvas();
  });
}

function latLngToXY(lat, lng) {
  const b = { minLat: 36.655, maxLat: 36.695, minLng: -121.660, maxLng: -121.610 };
  const w = window.innerWidth, h = window.innerHeight;
  return {
    x: ((lng - b.minLng) / (b.maxLng - b.minLng)) * w,
    y: (1 - (lat - b.minLat) / (b.maxLat - b.minLat)) * h
  };
}

function findHit(px, py) {
  const filtered = getFiltered();
  for (let i = filtered.length - 1; i >= 0; i--) {
    const inc = filtered[i];
    const { x, y } = latLngToXY(inc.lat, inc.lng);
    const r = CRIMES[inc.type].radius + 5;
    if ((px-x)*(px-x) + (py-y)*(py-y) <= r*r) return inc;
  }
  return null;
}

function drawCanvas() {
  const canvas = document.getElementById('canvas-map');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = window.innerWidth, h = window.innerHeight;

  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = 'rgba(40, 40, 70, 0.4)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < w; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for (let y = 0; y < h; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

  // Region heat
  ctx.fillStyle = 'rgba(255, 45, 45, 0.05)';
  const es = latLngToXY(36.678, -121.622);
  ctx.beginPath(); ctx.arc(es.x, es.y, 90, 0, Math.PI*2); ctx.fill();

  // Region labels
  ctx.fillStyle = 'rgba(140, 140, 180, 0.6)';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('EAST SALINAS', es.x + 35, es.y);
  const dt = latLngToXY(36.669, -121.654);
  ctx.fillText('DOWNTOWN', dt.x - 75, dt.y);
  const al = latLngToXY(36.687, -121.630);
  ctx.fillText('ALISAL', al.x + 20, al.y);

  // Center label
  ctx.fillStyle = 'rgba(90, 90, 122, 0.4)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SALINAS, CA — TAP DOTS FOR DETAILS', w/2, 40);

  // Draw markers
  const filtered = getFiltered();
  filtered.forEach(inc => {
    const cfg = CRIMES[inc.type];
    const { x, y } = latLngToXY(inc.lat, inc.lng);
    if (inc.year >= 2023) {
      ctx.beginPath();
      ctx.arc(x, y, cfg.radius + 6, 0, Math.PI*2);
      ctx.strokeStyle = cfg.color + '55';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(x, y, cfg.radius * 0.8, 0, Math.PI*2);
    ctx.fillStyle = cfg.color;
    ctx.globalAlpha = 0.75;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = cfg.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    if (selectedIncident && selectedIncident.id === inc.id) {
      ctx.beginPath();
      ctx.arc(x, y, cfg.radius + 9, 0, Math.PI*2);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });

  document.getElementById('badge-count').textContent = filtered.length;
}

function showSelectedInfo() {
  if (!selectedIncident) return;
  const cfg = CRIMES[selectedIncident.type];
  const info = document.getElementById('selected-info');
  info.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <span style="font-size:1.1rem">${cfg.emoji}</span>
      <span style="font-family:var(--display);font-weight:800;text-transform:uppercase;color:${cfg.color};font-size:0.9rem;">${selectedIncident.type}</span>
      <span style="font-size:0.55rem;color:var(--muted);margin-left:auto;">${selectedIncident.year} · #${selectedIncident.id}</span>
    </div>
    <div style="font-size:0.7rem;margin-bottom:4px;">📍 ${selectedIncident.area}</div>
    <div style="font-size:0.58rem;color:#8888aa;line-height:1.5;">${selectedIncident.desc}</div>
  `;
  info.classList.add('show');
}

function renderLegend() {
  const filtered = getFiltered();
  const counts = {};
  Object.keys(CRIMES).forEach(k => counts[k] = 0);
  filtered.forEach(i => counts[i.type]++);
  document.getElementById('tab-legend').innerHTML = Object.entries(CRIMES).map(([k, c]) => `
    <div class="legend-row ${visible[k] ? '' : 'off'}" onclick="toggleType('${k}')">
      <div class="color-swatch" style="background:${c.color}; color:${c.color}"></div>
      <div class="cr-label">${c.label}</div>
      <div class="cr-count">${counts[k]}</div>
      <div class="toggle-icon">${visible[k] ? '👁' : '🚫'}</div>
    </div>`).join('');
}

function renderFeed() {
  const sorted = [...getFiltered()].sort((a, b) => b.year - a.year);
  const c = document.getElementById('tab-feed');
  if (!sorted.length) {
    c.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted);font-size:0.65rem;">NO INCIDENTS MATCH FILTER</div>';
    return;
  }
  c.innerHTML = sorted.map(inc => {
    const cfg = CRIMES[inc.type];
    return `<div class="feed-card" onclick="zoomTo(${inc.lat},${inc.lng},${inc.id})" style="border-left-color:${cfg.color}">
      <div class="feed-dot" style="background:${cfg.color}; box-shadow:0 0 6px ${cfg.color}"></div>
      <div class="feed-body">
        <div class="feed-type" style="color:${cfg.color}">${cfg.emoji} ${inc.type}</div>
        <div class="feed-meta">${inc.year} · #${inc.id}</div>
        <div class="feed-area">${inc.area}</div>
      </div>
    </div>`;
  }).join('');
}

function refresh() {
  if (canvasMode) drawCanvas();
  else if (map) renderLeafletMarkers();
  renderLegend();
  renderFeed();
  document.getElementById('badge-count').textContent = getFiltered().length;
}

function toggleType(t) { visible[t] = !visible[t]; refresh(); }

function zoomTo(lat, lng, id) {
  if (map) {
    map.setView([lat, lng], 16);
    setTimeout(() => {
      leafletMarkers.forEach(m => {
        if (m.getLatLng && Math.abs(m.getLatLng().lat - lat) < 0.001) m.openPopup();
      });
    }, 300);
  } else if (canvasMode) {
    selectedIncident = incidents.find(i => i.id === id);
    showSelectedInfo();
    drawCanvas();
  }
  closeSheet();
}

document.querySelectorAll('.yr-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.yr-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeYear = chip.dataset.year;
    refresh();
  });
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = btn.dataset.tab;
    document.getElementById('tab-legend').style.display = t === 'legend' ? 'flex' : 'none';
    document.getElementById('tab-feed').style.display = t === 'feed' ? 'flex' : 'none';
  });
});

const sheet = document.getElementById('sheet');
const handle = document.getElementById('sheet-handle');
let sheetOpen = false;
function openSheet() { sheet.classList.remove('collapsed'); sheetOpen = true; }
function closeSheet() { sheet.classList.add('collapsed'); sheetOpen = false; }
handle.addEventListener('click', () => sheetOpen ? closeSheet() : openSheet());
let touchStartY = 0;
sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
sheet.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 40) closeSheet();
  if (dy < -40) openSheet();
}, { passive: true });

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
